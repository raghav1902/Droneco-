<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QR-powered lead acquisition and student engagement platform for coaching institutes." />
    <title>Droneco - Institute Lead Acquisition Platform</title>
    <script>
      (function() {
        try {
          document.documentElement.classList.add('disable-transitions');
          var savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
          }
          // We must wait for body to be available to add classes to it
          document.addEventListener('DOMContentLoaded', function() {
            if (savedTheme === 'dark') {
              document.body.classList.add('dark-theme', 'dark');
            }
          });
          window.addEventListener('load', function() {
            setTimeout(function() {
              document.documentElement.classList.remove('disable-transitions');
            }, 50);
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
